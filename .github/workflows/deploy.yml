    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_NEWS_FEED_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_NEWS_FEED_PROJECT_ID / VERCEL_TOKEN / VERCEL_ORG_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend

  deploy-system-design-qa-frontend:
    name: Deploy System Design QA Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [test, prod-build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SYSTEM_DESIGN_QA_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
