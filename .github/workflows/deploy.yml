name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci

      - name: Canvas backend — typecheck
        run: npm run lint --workspace=apps/canvas/backend
      - name: Canvas backend — tests
        run: npm test --workspace=apps/canvas/backend
      - name: Canvas frontend — typecheck
        run: npm run lint --workspace=apps/canvas/frontend
      - name: Canvas frontend — tests
        run: npm test --workspace=apps/canvas/frontend

      - name: News feed backend — typecheck
        run: npm run lint --workspace=apps/news-feed/backend
      - name: News feed backend — tests
        run: npm test --workspace=apps/news-feed/backend
      - name: News feed frontend — typecheck
        run: npm run lint --workspace=apps/news-feed/frontend

      - name: System Design QA backend — typecheck
        run: npm run lint --workspace=apps/system-design-qa/backend
      - name: System Design QA backend — tests
        run: npm test --workspace=apps/system-design-qa/backend

  prod-build:
    name: Production build (always runs)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Verify every workspace builds and start paths resolve
        # Catches deploy-time-only failures (tsc rootDir vs start path drift,
        # vite build errors, missing assets) without needing Vercel/Railway
        # credentials. Mirrors what `npm run verify:prod-build` runs locally.
        run: npm run verify:prod-build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      POSTGRES_IMAGE: postgres:16-alpine
      REDIS_IMAGE: redis:7-alpine
      CANVAS_URL: http://localhost:5173
      NEWS_FEED_URL: http://localhost:5174
      QA_URL: http://localhost:5175
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Boot full stack
        run: docker compose up -d
      - name: Wait for backends healthy
        run: |
          for port in 3000 3001 3002; do
            ok=false
            for i in {1..60}; do
              if curl -sf "http://localhost:$port/health" >/dev/null; then
                echo "port $port is up"
                ok=true
                break
              fi
              sleep 2
            done
            if [ "$ok" != "true" ]; then
              echo "::error::backend on port $port did not come up in 120s"
              docker compose logs --no-color | tail -120
              exit 1
            fi
          done
      - name: Wait for frontends
        run: |
          for port in 5173 5174 5175; do
            ok=false
            for i in {1..60}; do
              if curl -sf "http://localhost:$port" >/dev/null; then
                echo "port $port is up"
                ok=true
                break
              fi
              sleep 2
            done
            if [ "$ok" != "true" ]; then
              echo "::error::frontend on port $port did not come up in 120s"
              docker compose logs --no-color | tail -120
              exit 1
            fi
          done

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Capture docker logs
        if: always()
        run: docker compose logs --no-color > docker.log 2>&1 || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_id }}
          path: |
            e2e/reports
            docker.log
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy-canvas-frontend:
    name: Deploy Canvas Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [test, prod-build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CANVAS_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_CANVAS_PROJECT_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend

  deploy-news-feed-frontend:
