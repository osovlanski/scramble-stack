          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_SYSTEM_DESIGN_QA_PROJECT_ID / VERCEL_TOKEN / VERCEL_ORG_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend

  deploy-canvas-backend:
    name: Deploy Canvas Backend (Railway)
    runs-on: ubuntu-latest
    needs: [test, prod-build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Guard — skip if Railway not configured
        id: guard
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'
      - name: Install Railway CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g @railway/cli
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: railway up --service=canvas-backend --detach
        working-directory: apps/canvas/backend

  deploy-news-feed-backend:
