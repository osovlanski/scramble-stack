name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci

      - name: Canvas backend — typecheck
        run: npm run lint --workspace=apps/canvas/backend
      - name: Canvas backend — tests
        run: npm test --workspace=apps/canvas/backend
      - name: Canvas frontend — typecheck
        run: npm run lint --workspace=apps/canvas/frontend
      - name: Canvas frontend — tests
        run: npm test --workspace=apps/canvas/frontend

      - name: News feed backend — typecheck
        run: npm run lint --workspace=apps/news-feed/backend
      - name: News feed backend — tests
        run: npm test --workspace=apps/news-feed/backend
      - name: News feed frontend — typecheck
        run: npm run lint --workspace=apps/news-feed/frontend

      - name: System Design QA backend — typecheck
        run: npm run lint --workspace=apps/system-design-qa/backend

      - name: System Design QA backend — tests
        run: npm test --workspace=apps/system-design-qa/backend

  deploy-canvas-frontend:
    name: Deploy Canvas Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/canvas/frontend
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/canvas/frontend
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/canvas/frontend

  deploy-canvas-backend:
    name: Deploy Canvas Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --service=canvas-backend --detach
        working-directory: apps/canvas/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-news-feed-backend:
    name: Deploy News Feed Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --service=news-feed-backend --detach
        working-directory: apps/news-feed/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-system-design-qa-backend:
    name: Deploy System Design QA Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --service=system-design-qa-backend --detach
        working-directory: apps/system-design-qa/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
