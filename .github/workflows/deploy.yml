name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci

      - name: Canvas backend — typecheck
        run: npm run lint --workspace=apps/canvas/backend
      - name: Canvas backend — tests
        run: npm test --workspace=apps/canvas/backend
      - name: Canvas frontend — typecheck
        run: npm run lint --workspace=apps/canvas/frontend
      - name: Canvas frontend — tests
        run: npm test --workspace=apps/canvas/frontend

      - name: News feed backend — typecheck
        run: npm run lint --workspace=apps/news-feed/backend
      - name: News feed backend — tests
        run: npm test --workspace=apps/news-feed/backend
      - name: News feed frontend — typecheck
        run: npm run lint --workspace=apps/news-feed/frontend

      - name: System Design QA backend — typecheck
        run: npm run lint --workspace=apps/system-design-qa/backend
      - name: System Design QA backend — tests
        run: npm test --workspace=apps/system-design-qa/backend

  deploy-canvas-frontend:
    name: Deploy Canvas Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CANVAS_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_CANVAS_PROJECT_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Set dummy DB URLs for Prisma client generation
        if: steps.guard.outputs.skip != 'true'
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost/ci" >> $GITHUB_ENV
          echo "NEWS_DATABASE_URL=file:./ci.db" >> $GITHUB_ENV
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/canvas/frontend

  deploy-news-feed-frontend:
    name: Deploy News Feed Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_NEWS_FEED_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_NEWS_FEED_PROJECT_ID / VERCEL_TOKEN / VERCEL_ORG_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/news-feed/frontend

  deploy-system-design-qa-frontend:
    name: Deploy System Design QA Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SYSTEM_DESIGN_QA_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — skip if Vercel not configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_SYSTEM_DESIGN_QA_PROJECT_ID / VERCEL_TOKEN / VERCEL_ORG_ID not all set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend
      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: apps/system-design-qa/frontend

  deploy-canvas-backend:
    name: Deploy Canvas Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Guard — skip if Railway not configured
        id: guard
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - name: Install Railway CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g @railway/cli
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: railway up --service=canvas-backend --detach
        working-directory: apps/canvas/backend

  deploy-news-feed-backend:
    name: Deploy News Feed Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Guard — skip if Railway not configured
        id: guard
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - name: Install Railway CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g @railway/cli
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: railway up --service=news-feed-backend --detach
        working-directory: apps/news-feed/backend

  deploy-system-design-qa-backend:
    name: Deploy System Design QA Backend (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
